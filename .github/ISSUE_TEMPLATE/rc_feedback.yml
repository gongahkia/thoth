name: RC feedback
description: Report release-candidate feedback for 1.0 triage.
title: "[RC feedback]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this for RC1/RC2 feedback. Reports marked release-blocking should include reproduction evidence.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Crash
        - Install
        - Save/load
        - Bug
        - Balance
        - Feel
        - Scope
        - Accessibility
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: Build
      placeholder: "RC tag, itch channel, GitHub release, or commit"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - LOVE2D package
        - Unknown
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, or what felt wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or play context
      description: List steps, party, mission, week, route, and whether the issue repeats.
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Attach screenshots, logs, save files, replay files, or video links if available.
  - type: checkboxes
    id: blocking
    attributes:
      label: Release impact
      options:
        - label: This blocks 1.0 unless fixed or explicitly deferred.
          required: false
