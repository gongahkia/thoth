name: Alpha feedback
description: Report Phase 6 Buried Archive tactical alpha feedback by category.
title: "[Alpha feedback]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this for the Phase 6 Buried Archive tactical alpha. Pick one primary category so triage can sort feedback quickly.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Bug
        - Balance
        - Feel
        - Tactical readability
        - Route map or loadout
        - Scope
    validations:
      required: true
  - type: input
    id: build
    attributes:
      label: Build or download source
      placeholder: "itch alpha, GitHub release tag, or commit"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - LOVE2D from source
        - Unknown
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, or what felt wrong?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or play context
      description: For bugs, list steps. For balance/feel/scope, describe route node, board variant, objective type, class loadout, and turn state.
  - type: textarea
    id: tactical_context
    attributes:
      label: Tactical context
      description: Note objective type, selected unit/loadout, enemy intent, visible complication, and whether the counterplay was clear.
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Attach screenshots, logs, save files, replay files, or video links if available.
  - type: checkboxes
    id: permissions
    attributes:
      label: Permission
      options:
        - label: The maintainers may quote or summarize this feedback in public triage notes.
          required: false
