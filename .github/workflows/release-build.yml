name: Thoth Release Build

on:
  workflow_dispatch:
    inputs:
      upload_to_itch:
        description: Upload built packages to itch.io via butler
        required: false
        default: false
        type: boolean
      create_github_release:
        description: Create a GitHub Release and attach built packages
        required: false
        default: false
        type: boolean
      release_tag:
        description: Tag for manual GitHub Release creation
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"
      - "phase*-*"

permissions:
  contents: write

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit love zip unzip curl xvfb xauth rsync

      - name: Verify source package
        run: make check

      - name: Stage release source
        run: |
          rm -rf build/love-src release
          mkdir -p build/love-src release
          rsync -a main.lua conf.lua build/love-src/
          rsync -a src assets build/love-src/
          rm -rf build/love-src/assets/previews build/love-src/assets/replays

      - name: Build release packages
        id: love-build
        uses: nhartland/love-build@v1
        with:
          app_name: thoth
          love_version: "11.5"
          source_dir: build/love-src
          result_dir: release

      - name: Upload LOVE package
        uses: actions/upload-artifact@v4
        with:
          name: thoth-love
          path: ${{ steps.love-build.outputs['love-filename'] }}
          if-no-files-found: error

      - name: Upload Windows x64 package
        uses: actions/upload-artifact@v4
        with:
          name: thoth-windows-x64
          path: ${{ steps.love-build.outputs['win64-filename'] }}
          if-no-files-found: error

      - name: Upload Windows x86 package
        uses: actions/upload-artifact@v4
        with:
          name: thoth-windows-x86
          path: ${{ steps.love-build.outputs['win32-filename'] }}
          if-no-files-found: error

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: thoth-macos
          path: ${{ steps.love-build.outputs['macos-filename'] }}
          if-no-files-found: error

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v4
        with:
          name: thoth-linux-appimage
          path: ${{ steps.love-build.outputs['linux_x86_64-filename'] }}
          if-no-files-found: error

      - name: Validate itch upload config
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.upload_to_itch) || (startsWith(github.ref, 'refs/tags/') && vars.ITCH_UPLOAD_ENABLED == 'true') }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: ${{ vars.ITCH_TARGET }}
        run: |
          test -n "$BUTLER_API_KEY"
          test -n "$ITCH_TARGET"

      - name: Install butler
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.upload_to_itch) || (startsWith(github.ref, 'refs/tags/') && vars.ITCH_UPLOAD_ENABLED == 'true') }}
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          mkdir -p "$HOME/.local/bin"
          unzip -q butler.zip -d "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/butler"
          "$HOME/.local/bin/butler" version
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Upload packages to itch.io
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.upload_to_itch) || (startsWith(github.ref, 'refs/tags/') && vars.ITCH_UPLOAD_ENABLED == 'true') }}
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
          ITCH_TARGET: ${{ vars.ITCH_TARGET }}
          ITCH_VERSION: ${{ github.ref_name }}
          LOVE_PACKAGE: ${{ steps.love-build.outputs['love-filename'] }}
          WIN64_PACKAGE: ${{ steps.love-build.outputs['win64-filename'] }}
          WIN32_PACKAGE: ${{ steps.love-build.outputs['win32-filename'] }}
          MACOS_PACKAGE: ${{ steps.love-build.outputs['macos-filename'] }}
          LINUX_PACKAGE: ${{ steps.love-build.outputs['linux_x86_64-filename'] }}
        run: |
          butler push "$LOVE_PACKAGE" "$ITCH_TARGET:love" --userversion "$ITCH_VERSION"
          butler push "$WIN64_PACKAGE" "$ITCH_TARGET:windows-x64" --userversion "$ITCH_VERSION"
          butler push "$WIN32_PACKAGE" "$ITCH_TARGET:windows-x86" --userversion "$ITCH_VERSION"
          butler push "$MACOS_PACKAGE" "$ITCH_TARGET:macos" --userversion "$ITCH_VERSION"
          butler push "$LINUX_PACKAGE" "$ITCH_TARGET:linux-appimage" --userversion "$ITCH_VERSION"

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_github_release && inputs.release_tag != '') }}
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
          LOVE_PACKAGE: ${{ steps.love-build.outputs['love-filename'] }}
          WIN64_PACKAGE: ${{ steps.love-build.outputs['win64-filename'] }}
          WIN32_PACKAGE: ${{ steps.love-build.outputs['win32-filename'] }}
          MACOS_PACKAGE: ${{ steps.love-build.outputs['macos-filename'] }}
          LINUX_PACKAGE: ${{ steps.love-build.outputs['linux_x86_64-filename'] }}
        run: |
          release_tag="$GITHUB_REF_NAME"
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$MANUAL_RELEASE_TAG"
          fi

          assets=(
            "$LOVE_PACKAGE#thoth.love"
            "$WIN64_PACKAGE#thoth-windows-x64"
            "$WIN32_PACKAGE#thoth-windows-x86"
            "$MACOS_PACKAGE#thoth-macos"
            "$LINUX_PACKAGE#thoth-linux-appimage"
          )

          release_args=(--generate-notes --target "$GITHUB_SHA")
          if [[ "$release_tag" != v* ]]; then
            release_args+=(--prerelease --latest=false)
          fi

          if gh release view "$release_tag" >/dev/null 2>&1; then
            gh release upload "$release_tag" "${assets[@]}" --clobber
            exit 0
          fi

          gh release create "$release_tag" "${assets[@]}" "${release_args[@]}"
