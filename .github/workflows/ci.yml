name: CI

on:
  push:
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: true
      matrix:
        lua-version: [5.1, 5.2, 5.3, 5.4]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Lua
        uses: leafo/gh-actions-lua@v11
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Setup LuaRocks
        uses: leafo/gh-actions-luarocks@v5

      - name: Run tests
        run: make test
