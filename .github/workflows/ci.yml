name: Thoth Lua CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit love zip xvfb xauth

      - name: Run headless tests
        run: make test

      - name: Run asset checks
        run: make check

      - name: Run render3d smoke
        env:
          SDL_AUDIODRIVER: dummy
        run: make render-smoke

      - name: Build love package
        run: make package
