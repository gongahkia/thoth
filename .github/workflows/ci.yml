name: Thoth Lua CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Lua runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y luajit love xvfb xauth

      - name: Run unit tests
        run: make test

      - name: Run smoke
        run: make smoke

      - name: Run diagnostics
        run: make diagnostics

      - name: Run regression seeds
        run: make regressions

      - name: Run benchmark with baseline
        run: make bench

      - name: Run render smoke (headless)
        env:
          SDL_AUDIODRIVER: dummy
        run: xvfb-run -a make render-smoke

      - name: Run walk smoke (headless)
        env:
          SDL_AUDIODRIVER: dummy
        run: xvfb-run -a make walk-smoke

      - name: Run export smoke (headless)
        env:
          SDL_AUDIODRIVER: dummy
        run: xvfb-run -a make export-smoke

      - name: Upload benchmark baseline
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline
          path: tests/bench.baseline.json
